<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документация</title>
    <style>
        /* --- CSS Стили --- */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; }

        /* Боковое меню */
        .sidebar { width: 280px; background: #f8f9fa; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; position: fixed; height: 100%; transition: transform 0.3s ease; z-index: 100; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e9ecef; font-weight: bold; font-size: 1.2rem; }
        .nav-menu { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .nav-item { padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; color: #495057; }
        .nav-item:hover { background: #e9ecef; }
        .nav-item.active { background: #e2e6ea; border-left-color: #007bff; color: #007bff; font-weight: 500; }

        /* Контент */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; overflow-y: auto; background: #fff; }
        .content-section { display: none; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Переключатель языков */
        .lang-switch { padding: 20px; border-top: 1px solid #e9ecef; }
        .lang-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
        .lang-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* Мобильная адаптивность */
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 200; background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 80%; max-width: 300px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 70px 20px 20px; }
            .menu-toggle { display: block; }
        }

        /* Markdown стили */
        .main-content h1 { border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        .main-content code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; }
        .main-content pre { background: #f6f8fa; padding: 16px; overflow: auto; border-radius: 6px; }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰ Меню</button>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">DocsProject</div>
    <ul class="nav-menu" id="navMenu"></ul>
    <div class="lang-switch">
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
</nav>

<main class="main-content" id="mainContent">
    <div id="contentContainer"></div>
</main>

<script>
    class DocsApp {
        constructor() {
            this.currentLang = 'ru';
            this.currentSection = null;
            this.data = null;

            this.init();
        }

        async init() {
            // Определяем язык из URL или сохраняем в localStorage
            const urlParams = new URLSearchParams(window.location.search);
            this.currentLang = urlParams.get('lang') || localStorage.getItem('docsLang') || 'ru';

            await this.loadData();
            this.renderMenu();
            this.setupEventListeners();

            // Открываем первый раздел или тот, что в хеше
            const hash = window.location.hash.slice(1);
            this.showSection(hash || this.data.menu[0].id);
        }

        async loadData() {
            try {
                const response = await fetch(`data-${this.currentLang}.json`);
                this.data = await response.json();
                document.documentElement.lang = this.currentLang;
                localStorage.setItem('docsLang', this.currentLang);
            } catch (e) {
                document.getElementById('contentContainer').innerHTML = '<h1>Error loading data</h1>';
                console.error(e);
            }
        }

        renderMenu() {
            const menuEl = document.getElementById('navMenu');
            menuEl.innerHTML = this.data.menu.map(item =>
                `<li class="nav-item" data-id="${item.id}">${item.title}</li>`
            ).join('');

            // Обновляем кнопки языков
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === this.currentLang);
            });
        }

        showSection(sectionId) {
            if (!this.data.content[sectionId]) return;

            this.currentSection = sectionId;
            const container = document.getElementById('contentContainer');
            container.innerHTML = `<div class="content-section active">${this.data.content[sectionId]}</div>`;

            // Подсветка активного пункта меню
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === sectionId);
            });

            // Обновляем URL (хеш)
            window.location.hash = sectionId;

            // На мобильном закрываем меню после клика
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }

            window.scrollTo(0, 0);
        }

        setupEventListeners() {
            // Клик по меню
            document.getElementById('navMenu').addEventListener('click', (e) => {
                if (e.target.classList.contains('nav-item')) {
                    this.showSection(e.target.dataset.id);
                }
            });

            // Переключение языка
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const newLang = e.target.dataset.lang;
                    if (newLang !== this.currentLang) {
                        // Перезагружаем страницу с новым языком
                        window.location.search = `lang=${newLang}`;
                    }
                });
            });

            // Мобильное меню
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });

            // Закрытие меню при клике вне его (мобильные)
            document.addEventListener('click', (e) => {
                const sidebar = document.getElementById('sidebar');
                const toggle = document.getElementById('menuToggle');
                if (window.innerWidth <= 768 &&
                    !sidebar.contains(e.target) &&
                    !toggle.contains(e.target) &&
                    sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                }
            });
        }
    }

    // Запуск приложения
    document.addEventListener('DOMContentLoaded', () => {
        new DocsApp();
    });
</script>
</body>
</html>
